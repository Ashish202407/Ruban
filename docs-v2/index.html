<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The VC Corner — Investor Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
  <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("ruban-theme")||"light")</script>
</head>
<body>

  <!-- Upload Screen -->
  <div id="upload-screen">
    <div class="upload-grid-bg"></div>

    <div class="upload-left">
      <img src="img/logo.png" alt="The VC Corner" class="upload-logo">
      <h1 class="upload-heading">The VC Corner</h1>
      <p class="upload-tagline">Upload your template.<br>Get an investor-grade dashboard.</p>
      <div class="upload-pills">
        <span class="upload-pill">58 Sections</span>
        <span class="upload-pill">3 Sectors</span>
        <span class="upload-pill">100% Private</span>
      </div>
    </div>

    <div class="upload-right">
      <div id="drop-zone">
        <div class="drop-ring">
          <svg viewBox="0 0 56 56" fill="none">
            <path d="M28 8v24M18 22l10-10 10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 34v8a6 6 0 006 6h24a6 6 0 006-6v-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Drop your .xlsx file here</h2>
        <p>or click to browse</p>
        <div class="drop-badge">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M8 1L2 4v4c0 3.5 2.5 6.4 6 7 3.5-.6 6-3.5 6-7V4L8 1z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          </svg>
          100% client-side &mdash; data never leaves your device
        </div>
      </div>
      <div id="error-msg"></div>
    </div>

    <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard-screen">
    <nav class="dash-nav">
      <div class="nav-left">
        <button id="back-btn" aria-label="Go back">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M11 14L6 9l5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="nav-brand">
          <img src="img/logo.png" alt="The VC Corner" class="nav-logo">
          <span class="nav-title">The VC Corner</span>
        </div>
      </div>
      <div class="nav-center" id="theme-controls"></div>
      <div class="nav-right">
        <span class="nav-badge">Investor Dashboard</span>
      </div>
    </nav>
    <div id="dashboard"></div>
  </div>

  <!-- CDN Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- App Scripts -->
  <script src="js/registry.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
